workflows:
  ios-build:
    name: iOS Build

    max_build_duration: 60

    environment:
      xcode: latest
      node: 20

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bmtpc.iosapp

    integrations:
      app_store_connect: codemagic

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$APP_STORE_CONNECT_ISSUER_ID" "$APP_STORE_CONNECT_KEY_IDENTIFIER" "$APP_STORE_CONNECT_PRIVATE_KEY"
          keychain add-certificates
          xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/TestApp.xcworkspace \
            --scheme TestApp

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration