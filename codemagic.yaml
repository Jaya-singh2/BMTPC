workflows:
  ios-build:
    name: iOS Build

    environment:
      xcode: 26.1
      node: 20

      vars:
        USE_HERMES: "false"

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bmtpc.iosapp

    integrations:
      app_store_connect: codemagic

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install CocoaPods
        script: |
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          rm -rf build
          pod deintegrate
          pod install --repo-update

      - name: Clean iOS build
        script: |
           rm -rf ios/build
           rm -rf ~/Library/Developer/Xcode/DerivedData/*

      - name: Set up signing
        script: |
          xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/TestApp.xcworkspace \
            --scheme TestApp \
            --verbose

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true