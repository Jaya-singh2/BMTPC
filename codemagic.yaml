workflows:
  ios-build:
    name: iOS Build

    environment:
      xcode: latest
      node: 20

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bmtpc.iosapp

    integrations:
      app_store_connect: codemagic

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/TestApp.xcworkspace \
            --scheme TestApp \
            --verbose

    artifacts:
      - build/ios/ipa/*.ipa