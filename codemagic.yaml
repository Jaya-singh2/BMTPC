workflows:
  ios-build:
    name: iOS Build

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bmtpc.iosapp

    integrations:
      app_store_connect: codemagic

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace ios/TestApp.xcworkspace \
            --scheme TestApp